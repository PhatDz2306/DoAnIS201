version: '3.8'

services:
  db:
    image: postgres:15-alpine
    container_name: pet_erp_postgres
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password123
      POSTGRES_DB: erp_pet
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql

  # --- PHẦN GIAO DIỆN WEB (ADMINER) MỚI THÊM ---
  adminer:
    image: adminer
    container_name: pet_erp_adminer
    restart: always
    ports:
      - "8080:8080"
    depends_on:
      - db

volumes:
  pgdata: